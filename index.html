<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>佳雪 · Jiaxue — Paris</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+SC:wght@300;400;600&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1612; --cream: #f5f0e8; --warm: #f0e8d8;
    --accent: #c8553d; --gold: #d4a853; --sage: #7a9e7e;
    --muted: #8a7f74; --border: #d4c9bb;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { background:var(--cream); color:var(--ink); font-family:'Noto Serif SC',serif; overflow-x:hidden; }
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:100; opacity:0.6;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  }

  /* LANG SWITCHER */
  .lang-switcher {
    position:fixed; top:24px; right:28px; z-index:200;
    display:flex; gap:4px;
    background:rgba(26,22,18,0.88); border:1px solid rgba(212,168,83,0.25);
    border-radius:100px; padding:5px 8px; backdrop-filter:blur(10px);
  }
  .lang-btn {
    font-family:'Space Mono',monospace; font-size:10px; letter-spacing:1px;
    color:rgba(245,240,232,0.45); background:none; border:none; cursor:pointer;
    padding:5px 10px; border-radius:100px; transition:all 0.2s;
  }
  .lang-btn:hover { color:rgba(245,240,232,0.9); }
  .lang-btn.active { background:var(--gold); color:var(--ink); font-weight:bold; }

  /* HERO */
  .hero { min-height:100vh; display:grid; grid-template-columns:1fr 1fr; overflow:hidden; }
  .hero-left {
    background:var(--ink); color:var(--cream);
    padding:80px 60px; display:flex; flex-direction:column;
    justify-content:space-between; position:relative; overflow:hidden;
  }
  .hero-left::after {
    content:''; position:absolute; bottom:-60px; right:-60px;
    width:300px; height:300px; border-radius:50%;
    border:1px solid rgba(212,168,83,0.3); pointer-events:none;
  }
  .hero-left::before {
    content:''; position:absolute; top:40px; right:40px;
    width:120px; height:120px; border-radius:50%;
    border:1px solid rgba(212,168,83,0.2); pointer-events:none;
  }
  .nav-dot { display:flex; gap:8px; align-items:center; margin-bottom:60px; }
  .nav-dot .dot {
    width:8px; height:8px; border-radius:50%; background:var(--gold);
    display:inline-block; animation:pulse 2s infinite;
  }
  .nav-dot .dot:nth-child(2) { animation-delay:0.3s; background:var(--accent); }
  .nav-dot .dot:nth-child(3) { animation-delay:0.6s; background:var(--sage); }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
  .nav-label { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:2px; color:var(--muted); margin-left:4px; }
  .hero-name { font-family:'Playfair Display',serif; font-size:clamp(52px,6vw,88px); font-weight:700; line-height:0.95; letter-spacing:-2px; }
  .hero-name .cn { font-family:'Noto Serif SC',serif; font-weight:600; font-size:clamp(38px,4vw,60px); color:var(--gold); display:block; margin-bottom:8px; }
  .hero-location { font-family:'Space Mono',monospace; font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-top:24px; }
  .hero-tagline { font-size:15px; line-height:1.8; color:rgba(245,240,232,0.75); max-width:340px; margin-top:auto; padding-top:48px; }
  .hero-subtitle { font-family:'Space Mono',monospace; font-size:10px; color:rgba(245,240,232,0.25); letter-spacing:1px; }
  .hero-right { background:var(--warm); padding:80px 60px; display:flex; flex-direction:column; justify-content:center; }
  .roles-list { list-style:none; }
  .roles-list li {
    padding:20px 0; border-bottom:1px solid var(--border);
    display:flex; align-items:flex-start; gap:16px;
    opacity:0; transform:translateX(20px); animation:slideIn 0.6s forwards;
  }
  @keyframes slideIn { to{opacity:1;transform:translateX(0)} }
  .roles-list li:nth-child(1){animation-delay:0.1s} .roles-list li:nth-child(2){animation-delay:0.2s}
  .roles-list li:nth-child(3){animation-delay:0.3s} .roles-list li:nth-child(4){animation-delay:0.4s}
  .roles-list li:nth-child(5){animation-delay:0.5s}
  .role-emoji { font-size:20px; flex-shrink:0; margin-top:2px; }
  .role-title { font-family:'Playfair Display',serif; font-size:16px; font-weight:700; margin-bottom:4px; }
  .role-sub { font-size:12px; color:var(--muted); line-height:1.6; }

  /* SECTIONS */
  .section { padding:100px 0; }
  .container { max-width:1100px; margin:0 auto; padding:0 60px; }
  .section-label { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:4px; text-transform:uppercase; color:var(--accent); margin-bottom:16px; }
  .section-title { font-family:'Playfair Display',serif; font-size:clamp(32px,4vw,52px); font-weight:700; line-height:1.1; letter-spacing:-1px; margin-bottom:60px; }

  /* ABOUT */
  .about-grid { display:grid; grid-template-columns:1fr 1fr; gap:60px; align-items:start; }
  .about-text { font-size:16px; line-height:1.9; color:#3a3530; }
  .about-text p+p { margin-top:20px; }
  .highlight { background:linear-gradient(120deg,rgba(200,85,61,.15),rgba(212,168,83,.15)); padding:2px 6px; border-radius:3px; }
  .stat-cards { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .stat-card { background:var(--ink); color:var(--cream); padding:28px 24px; border-radius:4px; position:relative; overflow:hidden; transition:transform 0.2s; }
  .stat-card:hover { transform:translateY(-4px); }
  .stat-card::before { content:''; position:absolute; top:0; right:0; width:60px; height:60px; background:var(--gold); opacity:.1; border-radius:0 0 0 60px; }
  .stat-num { font-family:'Playfair Display',serif; font-size:42px; font-weight:700; color:var(--gold); line-height:1; }
  .stat-label { font-size:12px; color:rgba(245,240,232,.7); margin-top:8px; line-height:1.4; }

  /* PROJECTS */
  .projects-section { background:var(--ink); color:var(--cream); }
  .projects-section .section-title { color:var(--cream); }
  .projects-section .section-label { color:var(--gold); }
  .projects-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:2px; }
  .project-card { background:rgba(255,255,255,.03); padding:36px 28px; border:1px solid rgba(255,255,255,.06); position:relative; overflow:hidden; transition:background 0.3s; cursor:default; }
  .project-card:hover { background:rgba(255,255,255,.07); }
  .project-card::after { content:''; position:absolute; bottom:0; left:0; width:0%; height:2px; background:var(--gold); transition:width 0.4s; }
  .project-card:hover::after { width:100%; }
  .project-icon { font-size:28px; margin-bottom:20px; }
  .project-name { font-family:'Playfair Display',serif; font-size:18px; margin-bottom:12px; color:var(--cream); }
  .project-desc { font-size:13px; line-height:1.8; color:rgba(245,240,232,.55); }
  .project-tag { display:inline-block; font-family:'Space Mono',monospace; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--gold); border:1px solid rgba(212,168,83,.3); padding:3px 8px; border-radius:2px; margin-top:16px; }

  /* INTERESTS */
  .interests-section { background:var(--warm); }
  .interests-flow { display:flex; flex-wrap:wrap; gap:12px; }
  .interest-pill { padding:10px 20px; border:1.5px solid var(--ink); border-radius:100px; font-size:13px; font-family:'Space Mono',monospace; cursor:default; transition:all 0.2s; }
  .interest-pill:hover { background:var(--ink); color:var(--cream); }
  .interest-pill.accent { border-color:var(--accent); color:var(--accent); }
  .interest-pill.accent:hover { background:var(--accent); color:var(--cream); }
  .interest-pill.gold { border-color:var(--gold); color:#9a7020; }
  .interest-pill.gold:hover { background:var(--gold); color:var(--ink); }

  /* GOALS */
  .goals-list { display:flex; flex-direction:column; max-width:720px; }
  .goal-item { display:grid; grid-template-columns:56px 1fr; align-items:start; gap:24px; padding:32px 0; border-bottom:1px solid var(--border); }
  .goal-num { font-family:'Playfair Display',serif; font-size:48px; font-weight:700; color:var(--border); line-height:1; }
  .goal-title { font-family:'Playfair Display',serif; font-size:20px; margin-bottom:8px; }
  .goal-detail { font-size:13px; color:var(--muted); line-height:1.7; }

  /* FUN */
  .fun-section { background:var(--accent); color:var(--cream); padding:80px 0; }
  .fun-section .section-label { color:rgba(255,255,255,.6); }
  .fun-section .section-title { color:var(--cream); }
  .fun-ticker { overflow:hidden; white-space:nowrap; border-top:1px solid rgba(255,255,255,.2); border-bottom:1px solid rgba(255,255,255,.2); padding:16px 0; margin-bottom:48px; }
  .fun-ticker-inner { display:inline-block; animation:ticker 22s linear infinite; font-family:'Space Mono',monospace; font-size:12px; letter-spacing:2px; color:rgba(255,255,255,.7); }
  @keyframes ticker { from{transform:translateX(0)} to{transform:translateX(-50%)} }
  .fun-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:24px; }
  .fun-card { background:rgba(255,255,255,.1); border-radius:4px; padding:24px 20px; transition:background 0.2s; }
  .fun-card:hover { background:rgba(255,255,255,.15); }
  .fun-emoji { font-size:24px; margin-bottom:12px; }
  .fun-text { font-size:13px; line-height:1.6; color:rgba(255,255,255,.85); }

  /* CONNECT */
  .connect-section { background:var(--ink); color:var(--cream); padding:120px 0; text-align:center; }
  .connect-section .section-label { color:var(--sage); }
  .connect-title { font-family:'Playfair Display',serif; font-size:clamp(40px,6vw,80px); font-weight:700; line-height:1; letter-spacing:-2px; margin-bottom:24px; }
  .connect-title em { color:var(--gold); font-style:italic; }
  .connect-sub { font-size:15px; color:rgba(245,240,232,.6); max-width:500px; margin:0 auto 48px; line-height:1.8; }
  .connect-cta { display:inline-block; background:var(--gold); color:var(--ink); font-family:'Space Mono',monospace; font-size:12px; letter-spacing:2px; text-transform:uppercase; text-decoration:none; padding:16px 40px; border-radius:2px; transition:all 0.2s; }
  .connect-cta:hover { background:var(--cream); transform:translateY(-2px); }

  /* FOOTER */
  .footer { background:var(--ink); border-top:1px solid rgba(255,255,255,.08); padding:24px 60px; display:flex; justify-content:space-between; align-items:center; color:rgba(245,240,232,.3); font-family:'Space Mono',monospace; font-size:10px; letter-spacing:1px; }

  /* LANG TRANSITION */
  .lang-fade { animation:langFade 0.25s ease; }
  @keyframes langFade { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:translateY(0)} }

  /* RESPONSIVE */
  @media(max-width:900px) {
    .hero{grid-template-columns:1fr;min-height:auto}
    .hero-left{padding:80px 32px 60px;min-height:60vh}
    .hero-right{padding:48px 32px}
    .about-grid{grid-template-columns:1fr}
    .projects-grid{grid-template-columns:1fr}
    .fun-grid{grid-template-columns:repeat(2,1fr)}
    .container{padding:0 32px}
    .footer{flex-direction:column;gap:8px;text-align:center}
    .lang-switcher{top:16px;right:16px}
  }
  @media(max-width:600px) {
    .stat-cards{grid-template-columns:1fr}
    .fun-grid{grid-template-columns:1fr}
  }
</style>
</head>

function render(lang) {
  const t = T[lang];
  document.getElementById('hero-tagline').innerHTML = t.heroTagline;
  document.getElementById('hero-subtitle').textContent = t.heroSubtitle;
  document.getElementById('roles-list').innerHTML = t.roles.map(r =>
    `<li><span class="role-emoji">${r.emoji}</span><div class="role-content"><div class="role-title">${r.title}</div><div class="role-sub">${r.sub}</div></div></li>`).join('');
  document.getElementById('about-label').textContent = t.aboutLabel;
  document.getElementById('about-title').innerHTML = t.aboutTitle;
  document.getElementById('about-text').innerHTML = t.aboutText;
  ['stat1','stat2','stat3','stat4'].forEach((id,i) => document.getElementById(id).innerHTML = t[id]);
  document.getElementById('projects-label').textContent = t.projectsLabel;
  document.getElementById('projects-title').innerHTML = t.projectsTitle;
  document.getElementById('projects-grid').innerHTML = t.projects.map(p =>
    `<div class="project-card"><div class="project-icon">${p.icon}</div><div class="project-name">${p.name}</div><div class="project-desc">${p.desc}</div><span class="project-tag">${p.tag}</span></div>`).join('');
  document.getElementById('interests-label').textContent = t.interestsLabel;
  document.getElementById('interests-title').innerHTML = t.interestsTitle;
  document.getElementById('interests-flow').innerHTML = t.interests.map(i =>
    `<span class="interest-pill ${i.c}">${i.t}</span>`).join('');
  document.getElementById('goals-label').textContent = t.goalsLabel;
  document.getElementById('goals-title').innerHTML = t.goalsTitle;
  document.getElementById('goals-list').innerHTML = t.goals.map((g,i) =>
    `<div class="goal-item"><div class="goal-num">${String(i+1).padStart(2,'0')}</div><div class="goal-content"><div class="goal-title">${g.title}</div><div class="goal-detail">${g.detail}</div></div></div>`).join('');
  document.getElementById('fun-label').textContent = t.funLabel;
  document.getElementById('fun-title').innerHTML = t.funTitle;
  const tk = t.ticker + ' · ' + t.ticker + ' · ';
  document.getElementById('ticker-inner').textContent = tk;
  document.getElementById('fun-grid').innerHTML = t.funCards.map(c =>
    `<div class="fun-card"><div class="fun-emoji">${c.emoji}</div><div class="fun-text">${c.text}</div></div>`).join('');
  document.getElementById('connect-label').textContent = t.connectLabel;
  document.getElementById('connect-title').innerHTML = t.connectTitle;
  document.getElementById('connect-sub').textContent = t.connectSub;
  document.getElementById('connect-cta').textContent = t.connectCta;
  document.getElementById('footer-right').textContent = t.footerRight;
}

function setLang(lang) {
  document.querySelectorAll('.lang-btn').forEach(b => {
    const map = {zh:'中文', en:'EN', fr:'FR'};
    b.classList.toggle('active', b.textContent.trim() === map[lang]);
  });
  render(lang);
  document.documentElement.classList.remove('lang-fade');
  void document.documentElement.offsetWidth;
  document.documentElement.classList.add('lang-fade');
}

render('zh');
